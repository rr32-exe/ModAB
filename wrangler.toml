name = "autoblog"
main = "src/worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "autoblog-db"
database_id = "PLACEHOLDER_DB_ID"

[[kv_namespaces]]
binding = "CACHE"
id = "PLACEHOLDER_KV_ID"

[ai]
binding = "AI"

[triggers]
# Weekly publish schedule: Monday at 9am UTC
# The */2 cron rapidly processes queued articles after install.
# Once your initial batch is generated, remove "*/2 * * * *" to save AI quota.
crons = ["0 9 * * MON", "*/2 * * * *"]

[vars]
NICHE = "PLACEHOLDER"
SITE_NAME = "PLACEHOLDER"
SITE_URL = "https://example.com"
ARTICLES_PER_WEEK = "2"
LANGUAGE = "en"
TIMEZONE = "UTC"
ADSENSE_ID = ""
GA_ID = ""
RESEND_API_KEY = ""
YOCO_PUBLIC_KEY = ""
YOCO_SECRET_KEY = ""
YOCO_WEBHOOK_SECRET = ""
LUMA_API_KEY = ""
YOUTUBE_API_KEY = ""
BOOKING_AFFILIATE_ID = ""
GETYOURGUIDE_AFFILIATE_ID = ""
VIATOR_AFFILIATE_ID = ""
AMAZON_ASSOCIATE_ID = ""
